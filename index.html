<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Окно сообщений</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #d4d0c8;
    font-family: Tahoma, 'MS Sans Serif', Arial, sans-serif;
    font-size: 11px;
    color: #000;
  }

  /* ─── WINDOW CHROME ─── */
  #window {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    background: #d4d0c8;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    outline: 1px solid #000;
  }

  /* Title bar */
  #titlebar {
    background: linear-gradient(to right, #0a246a 0%, #a6caf0 100%);
    color: #fff;
    padding: 3px 4px 3px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    user-select: none;
    cursor: default;
  }
  #titlebar-left {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: bold;
  }
  #titlebar-left img {
    width: 14px;
    height: 14px;
  }
  .win-btn {
    width: 16px;
    height: 14px;
    background: #d4d0c8;
    border: 1px solid;
    border-color: #fff #808080 #808080 #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: bold;
    color: #000;
    cursor: pointer;
    margin-left: 2px;
    line-height: 1;
  }
  .win-btn:active {
    border-color: #808080 #fff #fff #808080;
  }

  /* Tabs bar */
  #tabsbar {
    background: #d4d0c8;
    border-bottom: 1px solid #808080;
    padding: 3px 4px 0;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    flex-shrink: 0;
  }
  .tab {
    padding: 2px 10px 3px;
    background: #d4d0c8;
    border: 1px solid #808080;
    border-bottom: none;
    font-size: 11px;
    cursor: pointer;
    position: relative;
    bottom: -1px;
    color: #000;
    user-select: none;
  }
  .tab.active {
    background: #fff;
    border-color: #808080;
    border-bottom: 1px solid #fff;
    font-weight: bold;
    z-index: 1;
  }
  .tab-icon {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00aa00;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* Info header */
  #infobar {
    background: #d4d0c8;
    border-bottom: 2px solid;
    border-color: #808080 #fff #fff #808080;
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: stretch;
    flex-shrink: 0;
  }
  #qip-logo {
    background: #d4d0c8;
    border-right: 1px solid #808080;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }
  #qip-logo-inner {
    width: 32px;
    height: 32px;
    background: #ff6600;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: bold;
    font-size: 14px;
    font-style: italic;
    border: 1px solid #cc4400;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.4);
  }
  #contact-fields {
    padding: 3px 6px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
  }
  .field-label {
    color: #404040;
    width: 28px;
    flex-shrink: 0;
  }
  .field-value {
    color: #000;
    font-weight: bold;
  }
  #contact-meta {
    padding: 3px 6px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    gap: 2px;
    border-left: 1px solid #808080;
    font-size: 11px;
    color: #404040;
    min-width: 90px;
  }

  /* ─── MESSAGE AREA ─── */
  #msg-area-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fff;
    border: 2px solid;
    border-color: #808080 #fff #fff #808080;
    margin: 2px 2px 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 4px 6px;
    font-size: 11px;
    line-height: 1.5;
    background: #fff;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 16px; }
  #messages::-webkit-scrollbar-track {
    background: #d4d0c8;
    border-left: 1px solid #808080;
  }
  #messages::-webkit-scrollbar-thumb {
    background: #d4d0c8;
    border: 1px solid;
    border-color: #fff #808080 #808080 #fff;
  }
  #messages::-webkit-scrollbar-button {
    background: #d4d0c8;
    border: 1px solid;
    border-color: #fff #808080 #808080 #fff;
    height: 16px;
    width: 16px;
  }

  .msg-block { margin-bottom: 4px; }

  .msg-header {
    font-weight: bold;
    font-size: 11px;
  }
  .msg-header.user-header { color: #8b0000; }
  .msg-header.bot-header  { color: #00008b; }

  .msg-time {
    font-weight: normal;
    font-size: 10px;
    color: #606060;
  }

  .msg-text {
    color: #000;
    font-size: 11px;
    margin-left: 0;
    word-wrap: break-word;
  }

  .msg-text a {
    color: #0000cc;
  }

  /* Typing indicator */
  .typing-block .msg-text {
    color: #606060;
    font-style: italic;
  }

  /* ─── TOOLBAR between areas ─── */
  #msg-toolbar {
    background: #d4d0c8;
    border-top: 1px solid #808080;
    border-bottom: 1px solid #808080;
    padding: 2px 4px;
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .tb-icon {
    width: 20px;
    height: 20px;
    background: #d4d0c8;
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
    color: #000;
  }
  .tb-icon:hover {
    border-color: #fff #808080 #808080 #fff;
    background: #d4d0c8;
  }
  .tb-icon:active {
    border-color: #808080 #fff #fff #808080;
  }
  .tb-sep-v {
    width: 1px;
    height: 16px;
    background: #808080;
    margin: 0 3px;
  }
  #char-count {
    margin-left: auto;
    font-size: 10px;
    color: #606060;
    padding-right: 4px;
  }

  /* ─── INPUT AREA ─── */
  #input-area {
    background: #fff;
    border-top: 1px solid #d4d0c8;
    flex-shrink: 0;
    position: relative;
  }

  #input-box {
    width: 100%;
    min-height: 52px;
    max-height: 100px;
    background: #fff;
    border: none;
    outline: none;
    resize: none;
    font-family: Tahoma, Arial, sans-serif;
    font-size: 11px;
    color: #000;
    padding: 4px 6px;
    line-height: 1.4;
  }

  #input-box::-webkit-scrollbar { width: 16px; }
  #input-box::-webkit-scrollbar-track { background: #d4d0c8; }
  #input-box::-webkit-scrollbar-thumb {
    background: #d4d0c8;
    border: 1px solid;
    border-color: #fff #808080 #808080 #fff;
  }

  /* ─── BOTTOM BAR ─── */
  #bottombar {
    background: #d4d0c8;
    border-top: 2px solid;
    border-color: #808080 #fff #fff #808080;
    padding: 3px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  #bottom-left {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .bottom-logo {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #404040;
    font-size: 10px;
    padding-right: 6px;
    border-right: 1px solid #808080;
    margin-right: 4px;
  }
  .bottom-logo-icon {
    width: 18px;
    height: 18px;
    background: #ff6600;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: bold;
    font-size: 10px;
    font-style: italic;
  }

  .status-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00aa00;
    border: 1px solid #006600;
    display: inline-block;
    margin-right: 2px;
  }
  .status-indicator.thinking {
    background: #ffaa00;
    border-color: #cc8800;
    animation: pulse 0.8s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #status-text {
    font-size: 10px;
    color: #404040;
  }

  #bottom-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .win98-btn {
    padding: 2px 12px;
    background: #d4d0c8;
    border: 1px solid;
    border-color: #fff #808080 #808080 #fff;
    font-family: Tahoma, Arial, sans-serif;
    font-size: 11px;
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    user-select: none;
    white-space: nowrap;
  }
  .win98-btn:hover { background: #e0ddd5; }
  .win98-btn:active {
    border-color: #808080 #fff #fff #808080;
    background: #c8c4bc;
  }
  .win98-btn:disabled {
    color: #808080;
    cursor: default;
  }
  .win98-btn.primary {
    font-weight: bold;
  }

  /* Bottom icons row */
  #bottom-icons {
    display: flex;
    align-items: center;
    gap: 2px;
    border-left: 1px solid #808080;
    margin-left: 4px;
    padding-left: 6px;
  }

  /* Error message */
  .msg-error {
    color: #cc0000;
    font-style: italic;
  }

  /* Connection status bar */
  #conn-bar {
    background: #ffffcc;
    border: 1px solid #cccc00;
    padding: 2px 6px;
    font-size: 10px;
    color: #666600;
    text-align: center;
    display: none;
    flex-shrink: 0;
  }
  #conn-bar.show { display: block; }

  /* Scrollbar corner */
  #messages::-webkit-scrollbar-corner { background: #d4d0c8; }
</style>
</head>
<body>

<div id="window">

  <!-- TITLE BAR -->
  <div id="titlebar">
    <div id="titlebar-left">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect width="14" height="14" rx="2" fill="#ff6600"/><text x="7" y="11" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-style="italic" font-family="Tahoma">Q</text></svg>
      <span id="win-title">[Chat] — Окно сообщений</span>
    </div>
    <div>
      <span class="win-btn" title="Свернуть">_</span>
      <span class="win-btn" title="Развернуть">□</span>
      <span class="win-btn" style="font-weight:bold;" onclick="if(window.Telegram&&Telegram.WebApp)Telegram.WebApp.close()" title="Закрыть">✕</span>
    </div>
  </div>

  <!-- TABS -->
  <div id="tabsbar">
    <div class="tab active">
      <span class="tab-icon"></span>
      <span id="tab-name">Ассистент</span>
    </div>
  </div>

  <!-- INFO HEADER -->
  <div id="infobar">
    <div id="qip-logo">
      <div id="qip-logo-inner">qip</div>
    </div>
    <div id="contact-fields">
      <div class="field-row">
        <span class="field-label">Имя</span>
        <span class="field-value" id="bot-name">AI Ассистент</span>
      </div>
      <div class="field-row">
        <span class="field-label">Email</span>
        <span class="field-value" style="color:#0000cc;">assistant@ai</span>
      </div>
    </div>
    <div id="contact-meta">
      <span id="user-uin">UIN: —</span>
      <span style="color:#008000; font-weight:bold;">● Online</span>
    </div>
  </div>

  <!-- CONNECTION WARNING -->
  <div id="conn-bar">⚠ Нет соединения с сервером. Проверьте подключение.</div>

  <!-- MESSAGE DISPLAY -->
  <div id="msg-area-wrapper">
    <div id="messages">
      <div class="msg-block" id="welcome-msg">
        <div class="msg-header bot-header">
          AI Ассистент <span class="msg-time" id="start-time"></span>
        </div>
        <div class="msg-text">Привет! Я готов к общению. Напиши что-нибудь 😊</div>
      </div>
    </div>
  </div>

  <!-- FORMAT TOOLBAR -->
  <div id="msg-toolbar">
    <div class="tb-icon" title="Жирный" onclick="wrapSelection('**')"><b>Ж</b></div>
    <div class="tb-icon" title="Курсив" onclick="wrapSelection('_')"><i>К</i></div>
    <div class="tb-icon" title="Подчёркнутый" onclick="wrapSelection('__')"><u>Ч</u></div>
    <div class="tb-sep-v"></div>
    <div class="tb-icon" title="Смайл" onclick="insertSmile()">😊</div>
    <div class="tb-icon" title="Смайл" onclick="insertSmileAt('😄')">😄</div>
    <div class="tb-icon" title="Смайл" onclick="insertSmileAt('😂')">😂</div>
    <div class="tb-icon" title="Смайл" onclick="insertSmileAt('👍')">👍</div>
    <div class="tb-sep-v"></div>
    <div class="tb-icon" title="Очистить историю" onclick="clearHistory()">🗑</div>
    <span id="char-count">0 симв.</span>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <textarea id="input-box"
      placeholder="Введите сообщение..."
      rows="3"
      onkeydown="handleKey(event)"
      oninput="updateCharCount()"
    ></textarea>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottombar">
    <div id="bottom-left">
      <div class="bottom-logo">
        <div class="bottom-logo-icon">q</div>
      </div>
      <span class="status-indicator" id="status-dot"></span>
      <span id="status-text">Готов</span>
    </div>
    <div id="bottom-right">
      <button class="win98-btn" onclick="closeWindow()">
        🚪 Закрыть
      </button>
      <div id="bottom-icons">
        <div class="tb-icon" title="Звук" id="sound-btn" onclick="toggleSound()">🔊</div>
        <div class="tb-icon" title="Очистить" onclick="clearMessages()">📋</div>
      </div>
      <button class="win98-btn primary" id="send-btn" onclick="sendMessage()">
        ✉ Отправить
      </button>
    </div>
  </div>

</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────
// Замени на URL твоего бэкенда на Render.com после деплоя
const BACKEND_URL = 'https://qip-bot-backend.onrender.com';
// Имя бота — можно менять
const BOT_DISPLAY_NAME = 'AI Ассистент';
// ──────────────────────────────────────────────────────────────────────

let tg = null;
let userName = 'Пользователь';
let userId = null;
let soundEnabled = true;
let isThinking = false;
let conversationId = null;

// Init Telegram WebApp
if (window.Telegram && window.Telegram.WebApp) {
  tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  const user = tg.initDataUnsafe && tg.initDataUnsafe.user;
  if (user) {
    userName = user.first_name || user.username || 'Пользователь';
    userId = user.id;
    document.getElementById('user-uin').textContent = 'UIN: ' + user.id;
    document.getElementById('tab-name').textContent = userName;
    document.getElementById('win-title').textContent = '[' + userName + '] — Окно сообщений';
  }
}

// Уникальный ID разговора (чтобы бэкенд держал контекст)
conversationId = userId
  ? 'tg_' + userId
  : 'anon_' + Math.random().toString(36).slice(2);

// Установить время в приветствии
document.getElementById('start-time').textContent = '(' + getTimeStr() + ')';

function getTimeStr() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const mo = String(now.getMonth() + 1).padStart(2, '0');
  const yy = now.getFullYear();
  return hh + ':' + mm + ':' + ss + ' ' + dd + '/' + mo + '/' + yy;
}

function updateCharCount() {
  const len = document.getElementById('input-box').value.length;
  document.getElementById('char-count').textContent = len + ' симв.';
}

function handleKey(e) {
  // Enter = отправить, Shift+Enter = новая строка
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function appendMessage(sender, text, headerClass) {
  const msgs = document.getElementById('messages');

  const block = document.createElement('div');
  block.className = 'msg-block';

  const header = document.createElement('div');
  header.className = 'msg-header ' + headerClass;
  header.innerHTML = escapeHtml(sender) + ' <span class="msg-time">(' + getTimeStr() + ')</span>';

  const body = document.createElement('div');
  body.className = 'msg-text';
  body.innerHTML = formatText(text);

  block.appendChild(header);
  block.appendChild(body);
  msgs.appendChild(block);

  msgs.scrollTop = msgs.scrollHeight;
  return block;
}

function appendTyping() {
  const msgs = document.getElementById('messages');

  const block = document.createElement('div');
  block.className = 'msg-block typing-block';
  block.id = 'typing-indicator';

  const header = document.createElement('div');
  header.className = 'msg-header bot-header';
  header.textContent = BOT_DISPLAY_NAME;

  const body = document.createElement('div');
  body.className = 'msg-text';
  body.textContent = 'печатает...';

  block.appendChild(header);
  block.appendChild(body);
  msgs.appendChild(block);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function formatText(text) {
  // Простое форматирование
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
  html = html.replace(/_(.*?)_/g, '<i>$1</i>');
  html = html.replace(/\n/g, '<br>');
  // Ссылки
  html = html.replace(
    /(https?:\/\/[^\s<]+)/g,
    '<a href="$1" target="_blank">$1</a>'
  );
  return html;
}

function setStatus(text, thinking) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  if (thinking) {
    dot.className = 'status-indicator thinking';
  } else {
    dot.className = 'status-indicator';
  }
}

function setConnBar(show) {
  const bar = document.getElementById('conn-bar');
  if (show) bar.classList.add('show');
  else bar.classList.remove('show');
}

async function sendMessage() {
  if (isThinking) return;

  const box = document.getElementById('input-box');
  const text = box.value.trim();
  if (!text) return;

  box.value = '';
  updateCharCount();
  document.getElementById('send-btn').disabled = true;
  isThinking = true;

  // Показать сообщение пользователя
  appendMessage(userName, text, 'user-header');

  // Показать индикатор печати
  setStatus('Печатает...', true);
  appendTyping();

  try {
    const resp = await fetch(BACKEND_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        conversation_id: conversationId,
        message: text,
        user_name: userName
      })
    });

    removeTyping();

    if (!resp.ok) {
      throw new Error('HTTP ' + resp.status);
    }

    const data = await resp.json();
    setConnBar(false);

    if (data.reply) {
      appendMessage(BOT_DISPLAY_NAME, data.reply, 'bot-header');
    } else {
      appendMessage(BOT_DISPLAY_NAME, '(нет ответа)', 'bot-header');
    }

    setStatus('Готов', false);

  } catch (err) {
    removeTyping();
    setConnBar(true);

    const errBlock = appendMessage('Система', 'Ошибка соединения. Проверьте бэкенд.', 'bot-header');
    errBlock.querySelector('.msg-text').classList.add('msg-error');

    setStatus('Ошибка', false);
    console.error(err);
  }

  isThinking = false;
  document.getElementById('send-btn').disabled = false;
  box.focus();
}

function closeWindow() {
  if (tg) {
    tg.close();
  } else {
    window.close();
  }
}

function clearMessages() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const block = document.createElement('div');
  block.className = 'msg-block';
  block.innerHTML = '<div class="msg-header bot-header">' + escapeHtml(BOT_DISPLAY_NAME) +
    ' <span class="msg-time">(' + getTimeStr() + ')</span></div>' +
    '<div class="msg-text">История очищена. Готов к новому разговору.</div>';
  msgs.appendChild(block);
}

function clearHistory() {
  if (confirm('Очистить историю сообщений?')) {
    clearMessages();
    // Сбросить контекст на бэкенде
    fetch(BACKEND_URL + '/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: conversationId })
    }).catch(() => {});
  }
}

function wrapSelection(wrap) {
  const box = document.getElementById('input-box');
  const start = box.selectionStart;
  const end = box.selectionEnd;
  const selected = box.value.substring(start, end);
  const newVal = box.value.substring(0, start) + wrap + selected + wrap + box.value.substring(end);
  box.value = newVal;
  box.selectionStart = start + wrap.length;
  box.selectionEnd = end + wrap.length;
  box.focus();
  updateCharCount();
}

function insertSmile() {
  insertSmileAt('😊');
}

function insertSmileAt(smile) {
  const box = document.getElementById('input-box');
  const pos = box.selectionStart;
  box.value = box.value.substring(0, pos) + smile + box.value.substring(pos);
  box.selectionStart = box.selectionEnd = pos + smile.length;
  box.focus();
  updateCharCount();
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-btn').textContent = soundEnabled ? '🔊' : '🔇';
}

// Focus input on load
window.addEventListener('load', () => {
  document.getElementById('input-box').focus();
});
</script>
